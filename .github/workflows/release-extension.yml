name: Release Extension

on:
  workflow_dispatch:
    inputs:
      blender_version:
        description: Blender version used for validate/build
        required: true
        default: "5.0.1"
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: release-extension
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      BLENDER_VERSION: ${{ inputs.blender_version || '5.0.1' }}

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Download Blender
        run: |
          major_minor="${BLENDER_VERSION%.*}"
          blender_url="https://download.blender.org/release/Blender${major_minor}/blender-${BLENDER_VERSION}-linux-x64.tar.xz"
          curl -fsSL "$blender_url" -o "$RUNNER_TEMP/blender.tar.xz"
          mkdir -p "$RUNNER_TEMP/blender"
          tar -xf "$RUNNER_TEMP/blender.tar.xz" -C "$RUNNER_TEMP/blender" --strip-components=1
          echo "$RUNNER_TEMP/blender" >> "$GITHUB_PATH"

      - name: Validate manifest and build extension artifacts
        run: |
          mkdir -p "$RUNNER_TEMP/build_extension_repo"
          blender --factory-startup --command extension validate "$GITHUB_WORKSPACE"
          blender --factory-startup --command extension build --source-dir "$GITHUB_WORKSPACE" --output-dir "$RUNNER_TEMP/build_extension_repo"
          blender --factory-startup --command extension server-generate --repo-dir "$RUNNER_TEMP/build_extension_repo"

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v7
        with:
          name: blender-extension-repo
          path: ${{ runner.temp }}/build_extension_repo/*

      - name: Clone publication repository
        env:
          H_BLENDER_ADDONS_TOKEN: ${{ secrets.H_BLENDER_ADDONS_TOKEN }}
        run: |
          if [ -z "$H_BLENDER_ADDONS_TOKEN" ]; then
            echo "Missing secret H_BLENDER_ADDONS_TOKEN" >&2
            exit 1
          fi

          git clone "https://x-access-token:${H_BLENDER_ADDONS_TOKEN}@github.com/HMiranda00/h_blender_addons.git" publish-repo

      - name: Sync generated artifacts to publication repository
        run: |
          zip_name="$(basename "$(python3 - <<'PY'
          import json
          from pathlib import Path

          index = json.loads(Path("${{ runner.temp }}/build_extension_repo/index.json").read_text())
          entry = next((item for item in index["data"] if item["id"] == "blender_project_manager"), index["data"][0])
          print(entry["archive_url"])
          PY
          )")"

          find publish-repo -maxdepth 1 -type f -name 'blender_project_manager-*.zip' ! -name "$zip_name" -delete

          cp "${{ runner.temp }}/build_extension_repo/index.json" "publish-repo/index.json"
          cp "${{ runner.temp }}/build_extension_repo/${zip_name}" "publish-repo/${zip_name}"

          if [ -f "extension_repo/README.md" ]; then
            cp "extension_repo/README.md" "publish-repo/README.md"
          fi

          if [ -f "extension_repo/blender_repo.example.toml" ]; then
            cp "extension_repo/blender_repo.example.toml" "publish-repo/blender_repo.example.toml"
          fi

      - name: Commit and push publication repo
        working-directory: publish-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json README.md blender_repo.example.toml blender_project_manager-*.zip

          if git diff --cached --quiet; then
            echo "No publication changes to push."
            exit 0
          fi

          version="$(python3 - <<'PY'
          import json
          from pathlib import Path
          index = json.loads(Path("${{ runner.temp }}/build_extension_repo/index.json").read_text())
          entry = next((item for item in index["data"] if item["id"] == "blender_project_manager"), index["data"][0])
          print(entry["version"])
          PY
          )"

          git commit -m "Publish Blender Project Manager extension v${version}"
          git push origin HEAD:main
